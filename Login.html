<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Infinity Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #0e0e0e; color: #ddd; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .auth-container { width: 100%; max-width: 400px; padding: 20px; }
        .auth-logo { width: 200px; margin: 0 auto 30px; display: block; }
        .section-box { background: #161616; border: 1px solid #222; border-radius: 12px; padding: 30px; overflow: hidden; }
        .auth-title { font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 25px; text-align: center; }
        
        .form-label-sm { font-size: 11px; color: #888; margin-bottom: 6px; display: block; }
        .form-input { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px; padding: 12px 14px; color: #fff; width: 100%; outline: none; font-size: 13px; margin-bottom: 18px; }
        .form-input:focus { border-color: #A416BD; }
        
        .btn-submit { background: linear-gradient(135deg, #002FA4, #A416BD); color: #fff; border: none; padding: 12px; border-radius: 10px; font-weight: 700; font-size: 14px; width: 100%; cursor: pointer; transition: .2s; margin-top: 10px; }
        .btn-submit:hover { opacity: 0.9; }
        
        .auth-link { text-align: center; margin-top: 25px; font-size: 12px; color: #888; }
        .auth-link a { color: #A416BD; text-decoration: none; font-weight: 600; }
        .auth-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="auth-container">
        <a href="HOME.HTML"><img src="img/LOGO1.png" class="auth-logo" alt="Logo"></a>
        <div class="section-box">
            <div class="auth-title">Welcome Back!</div>
            <form>
                <label class="form-label-sm">Email Address</label>
                <input type="email" class="form-input" placeholder="Masukkan email">
                
                <label class="form-label-sm">Password</label>
                <input type="password" class="form-input" placeholder="Masukkan password">
                
                <button type="button" class="btn-submit">Login</button>
            </form>
            <div class="auth-link">
                Belum punya akun? <a href="REGISTER.html">Daftar sekarang</a>
            </div>
        </div>
    </div>
</body>
</html>
