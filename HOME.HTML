<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity Shop</title>

    <link rel="stylesheet" href="style.css">

    <!-- Boxicons -->
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- ================= NAVBAR ================= -->

    <nav class="navbar">

        <div class="left-navbar">

            <button class="menu-btn">
                <i class='bx bx-menu'></i>
            </button>

            <img src="img/logo.png" class="logo">

        </div>

        <div class="search-box">

            <input type="text" placeholder="Cari semua di Infinity Shop">

            <button>
                <i class='bx bx-search'></i>
            </button>

        </div>

        <div class="nav-button">

            <button class="btn-register">
                Daftar
            </button>

            <button class="btn-login">
                Masuk
            </button>

        </div>

    </nav>

    <!-- ================= SLIDER ================= -->

    <section class="banner">

        <button class="prev">
            <i class='bx bx-chevron-left'></i>
        </button>

        <div class="slider">

            <img src="img/banner1.jpg" class="active">

            <img src="img/banner2.jpg">

            <img src="img/banner3.jpg">

            <img src="img/banner4.jpg">

        </div>

        <button class="next">
            <i class='bx bx-chevron-right'></i>
        </button>

        <div class="indicator">

            <span class="dot active"></span>

            <span class="dot"></span>

            <span class="dot"></span>

            <span class="dot"></span>

        </div>

    </section>

    <!-- ================= TITLE ================= -->

    <section class="title">

        <h2>TOP UP GAME 🔥</h2>

    </section>

    <!-- ================= GAME ================= -->

    <section class="game-container">

        <a href="#" class="game-card">

            <img src="img/freefire.jpg">

            <div class="game-name">

                <img src="img/logo-ff.png">

            </div>

        </a>

        <a href="#" class="game-card">

            <img src="img/mlbb.jpg">

            <div class="game-name">

                <img src="img/logo-mlbb.png">

            </div>

        </a>

        <a href="#" class="game-card">

            <img src="img/hok.jpg">

            <div class="game-name">

                <img src="img/logo-hok.png">

            </div>

        </a>

        <a href="#" class="game-card">

            <img src="img/pubg.jpg">

            <div class="game-name">

                <img src="img/logo-pubg.png">

            </div>

        </a>

        <a href="#" class="game-card">

            <img src="img/genshin.jpg">

            <div class="game-name">

                <img src="img/logo-genshin.png">

            </div>

        </a>

        <a href="#" class="game-card">

            <img src="img/wuwa.jpg">

            <div class="game-name">

                <img src="img/logo-wuwa.png">

            </div>

        </a>

        <a href="#" class="game-card">

            <img src="img/zzz.jpg">

            <div class="game-name">

                <img src="img/logo-zzz.png">

            </div>

        </a>

        <a href="#" class="game-card">

            <img src="img/hsr.jpg">

            <div class="game-name">

                <img src="img/logo-hsr.png">

            </div>

        </a>

    </section>

    <script src="script.js"></script>

</body>
</html>
