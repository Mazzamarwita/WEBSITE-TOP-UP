<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity Shop</title>

    <link rel="stylesheet" href="style.css">

    <!-- Boxicons -->
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <!-- ================= SIDEBAR ================= -->

    <aside class="sidebar">

        <!-- bagian atas sidebar -->
        <div class="sidebar-header">

            <button class="close-sidebar">
                <i class='bx bx-x'></i>
            </button>

            <img src="img/LOGO1.png"
                 class="sidebar-logo"
                 alt="Infinity Shop">

        </div>


        <!-- menu sidebar -->
        <div class="sidebar-menu">

            <a href="HOME.HTML"
               class="sidebar-link active">

                <i class='bx bx-home-alt-2'></i>

                <span>HOME</span>

            </a>


            <a href="#"
               class="sidebar-link">

                <i class='bx bx-receipt'></i>

                <span>TRANSAKSI</span>

            </a>


            <a href="#"
               class="sidebar-link">

                <i class='bx bx-badge-check'></i>

                <span>PROMO</span>

            </a>


            <a href="#"
               class="sidebar-link">

                <i class='bx bx-map'></i>

                <span>POINKU</span>

            </a>

        </div>

    </aside>



    <!-- ================= OVERLAY ================= -->

    <div class="sidebar-overlay"></div>

    <!-- navbar -->

    <nav class="navbar">

        <div class="left-navbar">

            <button class="menu-btn">
                <i class='bx bx-menu'></i>
            </button>

            <img src="img/LOGO1.png" class="logo">

        </div>

        <div class="search-box">

            <input type="text" placeholder="Cari semua di Infinity Shop">

            <button>
                <i class='bx bx-search'></i>
            </button>

        </div>

        <div class="nav-button">

            <button class="btn-register">
                Daftar
            </button>

            <button class="btn-login">
                Masuk
            </button>

        </div>

    </nav>

    <!-- slider -->

    <section class="banner">

        <button class="prev">
            <i class='bx bx-chevron-left'></i>
        </button>

        <div class="slider">

            <img src="img/banner1.png" class="active">

            <img src="img/banner2.png">

            <img src="img/banner3.png">

            <img src="img/banner4.png">

        </div>

        <button class="next">
            <i class='bx bx-chevron-right'></i>
        </button>

        <div class="indicator">

            <span class="dot active"></span>

            <span class="dot"></span>

            <span class="dot"></span>

            <span class="dot"></span>

        </div>

    </section>

    <!-- title -->

    <section class="title">

        <h2>TOP UP GAME 🔥</h2>

    </section>

    <!-- game -->

    <section class="game-container">

        <a href="FF.HTML" class="game-card">

            <img src="IMG/ff.jpg">

            <div class="game-name">

                <p>FREE FIRE</p>

            </div>

        </a>

        <a href="ML.html" class="game-card">

            <img src="img/ml.jpg">

            <div class="game-name">

                <p>MOBILE LEGENDS</p>

            </div>

        </a>

        <a href="HOK.html" class="game-card">

            <img src="img/hok.jpg">

            <div class="game-name">

                <p>HONOR OF KINGS</p>

            </div>

        </a>

        <a href="PUBG.html" class="game-card">

            <img src="img/pubg.jpg">

            <div class="game-name">

                <p>PUBG MOBILE</p>

            </div>

        </a>

        <a href="GI.html" class="game-card">

            <img src="img/genshin.jpg">

            <div class="game-name">

                <p>GENSHIN IMPACT</p>

            </div>

        </a>

        <a href="WUWA.html" class="game-card">

            <img src="img/wuwa.jpg">

            <div class="game-name">

                <p>WUTHERING WAVES</p>

            </div>

        </a>

        <a href="ZZZ.html" class="game-card">

            <img src="img/zzz.jpg">

            <div class="game-name">

                <p>ZENLESS ZONE ZERO</p>

            </div>

        </a>

        <a href="HSR.html" class="game-card">

            <img src="img/hsr.jpg">

            <div class="game-name">

                <p>HONKAI STAR</p>

            </div>

        </a>

    </section>

    <script src="script.js"></script>

</body>
</html>
