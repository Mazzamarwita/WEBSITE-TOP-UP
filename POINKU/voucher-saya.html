<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Voucher Saya</title>

    <link
        rel="stylesheet"
        href="voucher-saya.css"
    >

    <link
        href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
        rel="stylesheet"
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
    >

</head>


<body>


    <nav class="navbar">

        <div class="left-navbar">

            <button class="menu-btn">
                <i class="bx bx-menu"></i>
            </button>

            <img
                src="../img/LOGO1.png"
                class="logo"
                alt="Infinity Shop"
            >

        </div>


        <div class="search-box">

            <input
                type="text"
                placeholder="Cari semua di Infinity Shop"
            >

            <button>
                <i class="bx bx-search"></i>
            </button>

        </div>


        <div class="user-area">

            <div class="user-avatar">
                C
            </div>

            <span>
                Christmazza
            </span>

        </div>

    </nav>



    <main class="voucher-page">

        <h1>
            VOUCHER SAYA
        </h1>


        <div
            class="my-voucher-grid"
            id="myVoucherGrid"
        ></div>


        <div
            class="empty-voucher"
            id="emptyVoucher"
        >

            Belum ada voucher.

        </div>

    </main>


    <script src="voucher-saya.js"></script>

</body>

</html>
