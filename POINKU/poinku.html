<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Poinku - Infinity Shop</title>

    <!-- CSS -->
    <link
        rel="stylesheet"
        href="poinku.css"
    >
    <link
        rel="stylesheet"
        href="/auth.css"
    >

    <!-- BOX ICON DAN FONT -->
    <link
        href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
        rel="stylesheet"
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
    >

</head>


<body>

      <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <button class="close-sidebar">
                <i class='bx bx-x'></i>
            </button>
            <img href="HOME.html" src="/img/LOGO1.png"
                 class="sidebar-logo"
                 alt="Infinity Shop">
        </div>

        <!-- MENU SIDEBAR -->
        <div class="sidebar-menu">
            <a href="/HOME.HTML"
               class="sidebar-link">
                <i class='bx bx-home-alt-2'></i>
                <span>HOME</span>
            </a>

            <a href="/TRANSAKSI/daftar-transaksi.html"
               class="sidebar-link">
                <i class='bx bx-receipt'></i>
                <span>TRANSAKSI</span>
            </a>

            <a href="/PROMO/PROMO.html"
               class="sidebar-link">
                <i class='bx bx-badge-check'></i>
                <span>PROMO</span>
            </a>

            <a href="#pointku.html"
               class="sidebar-link active">
                <i class='bx bx-coin-stack'></i>
                <span>POINKU</span>
            </a>
        </div>
    </aside>

    <!-- OVERLAY -->
    <div class="sidebar-overlay"></div>

    <!-- NAVBAR -->

    <nav class="navbar">

        <div class="left-navbar">
            <button class="menu-btn">
                <i class="bx bx-menu"></i>
            </button>
            <img
                src="../img/LOGO1.png"
                class="logo"
                alt="Infinity Shop"
            >
        </div>

         <div class="nav-button" id="navbarUser">
            <a href="/REGISTER.html">
            <button class="btn-register">
                Daftar
            </button>
            </a>

            <a href="/LOGIN.html">
            <button class="btn-login">
                Masuk
            </button>
            </a>
        </div>
    </nav>



    <!-- POINKU -->
    <main class="point-page">

        <!-- TOP BAR -->
        <div class="point-topbar">

            <!-- SALDO POIN -->
            <div class="point-balance">
                <i class="bx bx-coin-stack"></i>
                <strong id="pointBalance">
                    0 Poin
                </strong>
            </div>


            <!-- VOUCHER SAYA -->
            <a
                href="voucher-saya.html"
                class="my-voucher-button"
            >
                <i class="bx bxs-coupon"></i>
                Voucher Saya
            </a>


        </div>

        <!-- JUDUL -->
        <h1>
            Ayo Tukarkan Poinmu!
        </h1>



        <!-- GRID VOUCHER -->

        <section class="voucher-grid">

            <!-- VOUCHER ML 20K -->
            <article
                class="voucher-card"
                data-id="ML20"
                data-game="Mobile Legends"
                data-value="20000"
                data-point="100"
                data-image="ML20K.png"
            >
                <img
                    src="/IMG/ML20K.png"
                    alt="Voucher Mobile Legends 20.000"
                >

                <div class="voucher-footer">
                    <span class="voucher-cost">
                        <i class="bx bx-coin-stack"></i>
                        100
                    </span>

                    <button class="exchange-button">
                        Tukar
                    </button>
                </div>

            </article>

            <!-- VOUCHER ML 40K -->
            <article
                class="voucher-card"
                data-id="ML40"
                data-game="Mobile Legends"
                data-value="40000"
                data-point="200"
                data-image="ML40K.png"
            >

                <img
                    src="/IMG/ML40K.png"
                    alt="Voucher Mobile Legends 40.000"
                >

                <div class="voucher-footer">
                    <span class="voucher-cost">
                        <i class="bx bx-coin-stack"></i>
                        200
                    </span>

                    <button class="exchange-button">
                        Tukar
                    </button>
                </div>
            </article>

            <!-- VOUCHER ML 60K -->
            <article
                class="voucher-card"
                data-id="ML60"
                data-game="Mobile Legends"
                data-value="60000"
                data-point="300"
                data-image="ML60K.png"
            >

                <img
                    src="/IMG/ML60K.png"
                    alt="Voucher Mobile Legends 60.000"
                >

                <div class="voucher-footer">
                    <span class="voucher-cost">
                        <i class="bx bx-coin-stack"></i>
                        300
                    </span>

                    <button class="exchange-button">
                        Tukar
                    </button>
                </div>
            </article>



            <!-- VOUCHER GI 20K -->
            <article
                class="voucher-card"
                data-id="GI20"
                data-game="Genshin Impact"
                data-value="20000"
                data-point="100"
                data-image="GI20K.png"
            >

                <img
                    src="/IMG/GI20K.png"
                    alt="Voucher Genshin Impact 20.000"
                >

                <div class="voucher-footer">
                    <span class="voucher-cost">
                        <i class="bx bx-coin-stack"></i>
                        100
                    </span>

                    <button class="exchange-button">
                        Tukar
                    </button>
                </div>
            </article>

            <!-- VOUCHER GI 40K -->
            <article
                class="voucher-card"
                data-id="GI40"
                data-game="Genshin Impact"
                data-value="40000"
                data-point="200"
                data-image="GI40K.png"
            >

                <img
                    src="/IMG/GI40K.png"
                    alt="Voucher Genshin Impact 40.000"
                >

                <div class="voucher-footer">
                    <span class="voucher-cost">
                        <i class="bx bx-coin-stack"></i>
                        200
                    </span>

                    <button class="exchange-button">
                        Tukar
                    </button>
                </div>
            </article>

            <!-- VOUCHER GI 60K -->
            <article
                class="voucher-card"
                data-id="GI60"
                data-game="Genshin Impact"
                data-value="60000"
                data-point="300"
                data-image="GI60K.png"
            >

                <img
                    src="/IMG/GI60K.png"
                    alt="Voucher Genshin Impact 60.000"
                >

                <div class="voucher-footer">
                    <span class="voucher-cost">
                        <i class="bx bx-coin-stack"></i>
                        300
                    </span>

                    <button class="exchange-button">
                        Tukar
                    </button>
                </div>
            </article>
        </section>
    </main>



    <!-- MODAL KONFIRMASI TUKAR VOUCHER -->
    <div
        class="modal-overlay"
        id="exchangeModal"
    >
        <div class="exchange-modal">
            <h2>
                Tukarkan voucher sebesar
            </h2>

            <div class="modal-point">
                <i class="bx bx-coin-stack"></i>

                <strong id="modalPoint">
                    0 Poin
                </strong>
            </div>


            <div class="modal-buttons">
                <button
                    type="button"
                    class="close-modal-button"
                    id="closeExchangeModal"
                >
                    Tutup
                </button>

                <button
                    type="button"
                    class="continue-exchange-button"
                    id="continueExchange"
                >
                    Lanjutkan
                </button>
            </div>
        </div>
    </div>


    <!-- MODAL VOUCHER BERHASIL DITUKAR -->
    <div
        class="modal-overlay"
        id="successModal"
    >

        <div class="success-modal">
            <button
                type="button"
                class="close-success"
                id="closeSuccess"
            >
                <i class="bx bx-x"></i>
            </button>

            <h2>
                Voucher Berhasil Ditukar
            </h2>

            <div class="success-check">
                <i class="bx bx-check"></i>
            </div>
        </div>
    </div>


    <!-- JAVA SCRIPT -->
    <script src="poinku.js"></script>
    <script src="/script.js"></script>
    <script src="/auth.js"></script>

</body>

</html>
